    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        apple: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Text"', '"SF Pro Display"', '"Helvetica Neue"', 'Arial', 'sans-serif'],
                    },
                    keyframes: {
                        'glow-pulse': {
                            '0%, 100%': { opacity: '0.4', transform: 'scale(1)' },
                            '50%': { opacity: '0.7', transform: 'scale(1.1)' },
                        },
                        'shimmer': {
                            '0%': { transform: 'translateX(-100%)' },
                            '100%': { transform: 'translateX(100%)' }
                        },
                        'border-glow': {
                            '0%, 100%': { 'border-color': 'rgba(59, 130, 246, 0.4)', 'box-shadow': '0 0 10px rgba(59, 130, 246, 0.2)' },
                            '50%': { 'border-color': 'rgba(59, 130, 246, 0.8)', 'box-shadow': '0 0 25px rgba(59, 130, 246, 0.6)' }
                        },
                        'scroll-code': {
                            '0%': { transform: 'translateY(0)' },
                            '100%': { transform: 'translateY(-50%)' }
                        }
                    },
                    animation: {
                        'glow-pulse': 'glow-pulse 4s ease-in-out infinite',
                        'shimmer': 'shimmer 2.5s infinite linear',
                        'active-glow': 'border-glow 1s ease-in-out infinite',
                        'scroll-code': 'scroll-code 40s linear infinite'
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .dark .glass-card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .highlight-glow {
            position: relative;
        }
        .highlight-glow::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, #3b82f6, #60a5fa, #3b82f6);
            background-size: 400%;
            z-index: -1;
            filter: blur(8px);
            border-radius: 20px;
            animation: move-glow 8s linear infinite;
            opacity: 0.6;
        }
        .dark .highlight-glow::before {
            background: linear-gradient(45deg, #1e40af, #3b82f6, #1e40af);
            filter: blur(12px);
            opacity: 0.8;
        }
        @keyframes move-glow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .active-hold-glow:active {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.4), inset 0 0 10px rgba(59, 130, 246, 0.2) !important;
        }
        .dark .active-hold-glow:active {
            box-shadow: 0 0 35px rgba(59, 130, 246, 0.9), inset 0 0 15px rgba(59, 130, 246, 0.5) !important;
        }

        .code-animation-overlay {
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
        }
    </style>
